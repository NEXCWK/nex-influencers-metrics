[build]
builder = "NIXPACKS"

[[services]]
name = "backend"
source = "backend"

[services.build]
buildCommand = "npm install"
startCommand = "npm start"

[services.variables]
PORT = "3001"

[[services]]
name = "frontend"
source = "frontend"

[services.build]
buildCommand = "npm install && npm run build"
startCommand = "npx serve dist -p $PORT"
